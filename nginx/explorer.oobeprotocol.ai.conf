# Synapse SAP Explorer — nginx reverse proxy
# Domain: explorer.oobeprotocol.ai
# Upstream: Next.js on localhost:3000
#
# 1. Copy to /etc/nginx/sites-available/
#    sudo cp explorer.oobeprotocol.ai.conf /etc/nginx/sites-available/
# 2. Enable:
#    sudo ln -s /etc/nginx/sites-available/explorer.oobeprotocol.ai.conf /etc/nginx/sites-enabled/
# 3. Test & reload:
#    sudo nginx -t && sudo systemctl reload nginx
# 4. SSL via certbot:
#    sudo certbot --nginx -d explorer.oobeprotocol.ai

upstream nextjs_explorer {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name explorer.oobeprotocol.ai;

    # Redirect all HTTP to HTTPS (certbot will handle this after setup)
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://nextjs_explorer;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR in dev, potential future WS)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://nextjs_explorer;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public assets
    location /images/ {
        proxy_pass http://nextjs_explorer;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # API routes — no cache, longer timeouts for RPC calls
    location /api/ {
        proxy_pass http://nextjs_explorer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        add_header Cache-Control "no-store";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Max body size (for any POST endpoints)
    client_max_body_size 10m;

    # Logging
    access_log /var/log/nginx/explorer.oobeprotocol.ai.access.log;
    error_log  /var/log/nginx/explorer.oobeprotocol.ai.error.log;
}
